<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Rubik + Reloj Mundial + MotoGP 2026 — Multi Puzzle</title>
<style>
:root { --bg:#000; --card:#0b0b0b; --muted:#9aa3ac; --white:#fff; }
body { background: var(--bg); color: var(--white); font-family: Inter, Arial, sans-serif; margin:0; padding:18px;}
h1 { margin:0 0 12px; font-size:26px; }
.section { background: rgba(255,255,255,0.02); padding:12px; border-radius:10px; margin-bottom:14px; border:1px solid rgba(255,255,255,0.04);}
.flex { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
input, button, select { background:transparent; border:1px solid rgba(255,255,255,0.08); color:var(--white); padding:8px; border-radius:8px; }
#cubeType { background:#111; color:#fff; border:1px solid rgba(255,255,255,0.2); padding:8px 12px; border-radius:8px; font-weight:600; cursor:pointer; }
#cubeType:hover { background:#222; }
#algorithmCategory {
  background: #111;

  color: #fff;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
  padding:6px 10px;
}
#algorithmCategory option {
  background:#111;
  color:#fff;
}
button { cursor:pointer; transition:background 0.3s, transform 0.2s; }
button:hover { background:rgba(255,255,255,0.08); transform:scale(1.03); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-top:12px; }
.card { background: var(--card); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); }
.label { font-weight:700; }
.tz { color:var(--muted); font-size:13px; }
.time { font-family:ui-monospace,Menlo; font-size:18px; margin-top:4px; font-weight:700; }
.date { color:var(--muted); font-size:12px; }
.muted { color: var(--muted); }
.small { font-size:13px; padding:6px 8px; border-radius:8px; }
.race-list { max-height:520px; overflow:auto; margin-top:8px; padding-right:6px; }
.race-row { display:flex; align-items:center; justify-content:space-between; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.02); margin-bottom:8px; flex-wrap:wrap; }
.race-info { display:flex; flex-direction:column; gap:4px; min-width:180px; }
.small-input { padding:6px; border-radius:6px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:var(--white); }
.top-section { display:flex; gap:20px; flex-wrap:wrap; justify-content:space-between;}
.rubik-section { flex:1; min-width:320px; }
.clocks-section { flex:1; min-width:260px; max-height:500px; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.scramble { font-family:monospace; font-size:24px; margin-bottom:6px; white-space:pre-wrap; word-break:break-word; }
#startStopRubik { font-size:16px; padding:12px 20px; border-radius:10px; min-height:30px; background:#007a00; border:1px solid #007a00; }
#startStopRubik.running { background:#a40000; border-color:#a40000; }
#rubikTimesList div { padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.02); margin-top:6px; font-family:ui-monospace,Menlo; }
#timerSection { margin-top:20px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); display:none;}
#timerDisplay { font-size:24px; font-weight:700; margin-bottom:8px;}
#notesSection { margin-top:20px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); display:none;}
#notesText { width:100%; height:80px; background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:6px; font-family:ui-monospace,Menlo; }
#rubikStats { margin-bottom:10px; }
#algorithmDisplay { padding:6px; border-radius:6px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:var(--white); }
</style>
</head>
<body>

<h1>Rubik + Reloj Mundial + MotoGP 2026 — Multi Puzzle</h1>

<audio id="alarmSound" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" preload="auto"></audio>

<div class="top-section">
  <!-- Cronómetro Rubik -->
  <div class="section rubik-section">
    <div style="margin-bottom:8px;">
      <label for="cubeType">Tipo de puzzle:</label>
      <select id="cubeType" class="small-input">
        <option value="2">2x2</option>

<!-- Algoritmos -->
<div class="section" id="algorithmsWrapper">

  <div id="algorithmsSection" style="display:none; margin-top:8px;">

      <option>VLS</option>
      <option>WV</option>

</div>
<!-- Temporizador -->
<div class="section" id="timerWrapper">
  <button id="toggleTimer" class="small">Mostrar temporizador</button>

      <input type="number" id="timerMinutes" placeholder="Minutos" class="small-input" style="width:100px;">
      <input type="number" id="timerSeconds" placeholder="Segundos" class="small-input" style="width:100px;">

</div>
<script>
// ----------------- SCRAMBLES -----------------
let cubeType=document.getElementById("cubeType").value;
const scrambleDisplay=document.getElementById("scrambleDisplay");
let currentScramble="";
const rubikTimesList=document.getElementById("rubikTimesList");
let rubikAttemptCounts={};
let rubikRunning=false;
let rubikTimer=null;
let startTime=0;

function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function genScrambleNxN(n){
  const faces=["U","D","L","R","F","B"];
  const suffixes=["","'","2"];
  let moves=[]; faces.forEach(face=>{ suffixes.forEach(s=>moves.push(face+s)); if(n>=4) suffixes.forEach(s=>moves.push(face+"w"+s)); });
  const lengths={2:9,3:20,4:40,5:60,6:80,7:100};
  const len=lengths[n]||20; let scramble=[]; let last="";
  for(let i=0;i<len;i++){ let m; do{ m=choice(moves);} while(m[0]===last); scramble.push(m); last=m[0]; }
  return scramble.join(" ");
}
function genMegaminx(){ const moves = ["R++","R--","D++","D--","U","U'"]; let scramble = []; for(let i=0;i<50;i++) scramble.push(choice(moves)); return scramble.join(" "); }
function genPyraminx(){ const faceMoves = ["U","L","R","B"]; const tipMoves = ["u","l","r"]; const faceSuffix = ["","'"]; const tipSuffix = ["","'"]; let scrambleFaces=[], scrambleTips=[]; let last=""; for(let i=0;i<8;i++){ let m; do{ m = choice(faceMoves)+choice(faceSuffix); }while(m[0]===last); scrambleFaces.push(m); last=m[0]; } for(let i=0;i<3;i++) scrambleTips.push(choice(tipMoves)+choice(tipSuffix)); return scrambleFaces.join(" ")+" "+scrambleTips.join(" "); }
function genSkewb(){ const moves=["R","L","U","B"]; const suffix=["","'"]; let s=[], last=""; for(let i=0;i<11;i++){ let m; do{ m = choice(moves)+choice(suffix); }while(m[0]===last); s.push(m); last=m[0]; } return s.join(" "); }
function genSquare1(){ const parts=[]; for(let i=0;i<12;i++){ let a=randInt(-6,6), b=randInt(-6,6); if(a===0 && b===0) a=1; parts.push(`(${a},${b})/`); } return parts.join(" "); }
function genClock(){ const clockMoves=["dUUU","UddU","UUUd","Uddd","ddUd","ddUU","dUUd","dUdd"]; const clockXs=[1,2,3,4]; const clockYs=[-2,-1,1,2,3,4,5]; const length=randInt(10,15); let s=[]; for(let i=0;i<length;i++){ s.push(`(${choice(clockMoves)},${choice(clockXs)},${choice(clockYs)})`); } return s.join(" "); }

function genScrambleFor(type){ if(!type) type="3"; if(["2","3","4","5","6","7"].includes(type)) return genScrambleNxN(Number(type)); if(type==="megaminx") return genMegaminx(); if(type==="pyraminx") return genPyraminx(); if(type==="skewb") return genSkewb(); if(type==="sq1") return genSquare1(); if(type==="clock") return genClock(); return genScrambleNxN(3); }

function showScramble(){ currentScramble=genScrambleFor(cubeType); scrambleDisplay.textContent=currentScramble; }
document.getElementById("cubeType").onchange=e=>{ cubeType=e.target.value; showScramble(); rubikAttemptCounts[cubeType]=rubikAttemptCounts[cubeType]||0; };
document.getElementById("newScrambleRubik").onclick=showScramble;
showScramble();

// ----------------- CRONÓMETRO -----------------
let timerDisplayRubik=document.getElementById("timerDisplayRubik");

function parseTimeToSeconds(timeStr){ const [minSec, dec] = timeStr.split("."); const [min, sec] = minSec.split(":").map(Number); return min*60 + sec + Number(dec)/100; }
function formatSecondsToTime(sec){ const m = Math.floor(sec/60); const s = Math.floor(sec%60); const d = Math.floor((sec - Math.floor(sec))*100); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(d).padStart(2,'0')}`; }
function updateRubikStats(){ const times = Array.from(rubikTimesList.querySelectorAll("div")).map(d=>{ const t = d.textContent.match(/Tiempo: (\d{2}:\d{2}\.\d{2})/); return t ? parseTimeToSeconds(t[1]) : null; }).filter(Boolean); if(times.length===0){ document.getElementById("bestTime").textContent="--:--.--"; document.getElementById("worstTime").textContent="--:--.--"; document.getElementById("avgTime").textContent="--:--.--"; return; } const best=Math.min(...times); const worst=Math.max(...times); const avg=times.reduce((a,b)=>a+b,0)/times.length; document.getElementById("bestTime").textContent=formatSecondsToTime(best); document.getElementById("worstTime").textContent=formatSecondsToTime(worst); document.getElementById("avgTime").textContent=formatSecondsToTime(avg); }

document.getElementById("startStopRubik").onclick=()=>{ if(!rubikRunning){ rubikRunning=true; startTime=Date.now(); rubikTimer=setInterval(updateRubikDisplay,10); document.getElementById("startStopRubik").classList.add("running"); } else { rubikRunning=false; clearInterval(rubikTimer); document.getElementById("startStopRubik").classList.remove("running"); rubikAttemptCounts[cubeType] = rubikAttemptCounts[cubeType]? rubikAttemptCounts[cubeType]+1:1; const attempt = rubikAttemptCounts[cubeType]; const totalTime = timerDisplayRubik.textContent; const div = document.createElement("div"); div.textContent=`${attempt}. Tipo: ${cubeType}, Tiempo: ${totalTime}, Scramble: ${currentScramble}`; rubikTimesList.prepend(div); timerDisplayRubik.textContent="00:00.00"; showScramble(); updateRubikStats(); } };

function updateRubikDisplay(){ const total=(rubikRunning?Date.now()-startTime:0); const mins=Math.floor(total/60000); const secs=Math.floor(total/1000)%60; const dec=Math.floor((total%1000)/10); timerDisplayRubik.textContent=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(dec).padStart(2,'0')}`; }

document.getElementById("resetRubikTimes").onclick=()=>{ rubikTimesList.innerHTML=""; rubikAttemptCounts={}; rubikRunning=false; clearInterval(rubikTimer); timerDisplayRubik.textContent="00:00.00"; updateRubikStats(); };

document.getElementById("deleteLastTime").onclick=()=>{ const last=rubikTimesList.querySelector("div"); if(last) last.remove(); updateRubikStats(); };

document.getElementById("copyRubikTimes").onclick = () => { let text = ""; rubikTimesList.querySelectorAll("div").forEach(div => text += div.textContent+"\n"); if(text) navigator.clipboard.writeText(text).then(()=>alert("✅ Tiempos copiados")).catch(()=>alert("❌ No se pudo copiar")); else alert("No hay tiempos para copiar"); };

// ----------------- TEMPORIZADOR -----------------
let timerInterval=null,remainingTime=0;
const timerDisplay=document.getElementById("timerDisplay"),alarm=document.getElementById("alarmSound");
function updateTimerDisplay(){ const mins=Math.floor(remainingTime/60),secs=remainingTime%60; timerDisplay.textContent=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;}
document.getElementById("startTimer").onclick=function(){ if(timerInterval)return; const mins=parseInt(document.getElementById("timerMinutes").value)||0; const secs=parseInt(document.getElementById("timerSeconds").value)||0; remainingTime=mins*60+secs; if(remainingTime<=0)return alert("Ingresa tiempo válido"); updateTimerDisplay(); timerInterval=setInterval(()=>{ remainingTime--; updateTimerDisplay(); if(remainingTime<=0){ clearInterval(timerInterval); timerInterval=null; updateTimerDisplay(); alert("⏰ ¡Tiempo terminado!"); alarm.play().catch(e=>console.log("Reproducción bloqueada")); } },1000);};
document.getElementById("resetTimer").onclick=function(){ clearInterval(timerInterval); timerInterval=null; remainingTime=0; updateTimerDisplay(); };

// ----------------- RELOJES -----------------
const userZones=[ {label:"España (Málaga)",tz:"Europe/Madrid"}, {label:"Nueva York",tz:"America/New_York"}, {label:"Londres",tz:"Europe/London"}, {label:"Moscú",tz:"Europe/Moscow"}, {label:"Dubái",tz:"Asia/Dubai"}, {label:"Honolulu",tz:"Pacific/Honolulu"}, ];
function updateClocks(){ const container=document.getElementById("clocksContainer"); container.innerHTML=""; userZones.forEach(z=>{ const t=new Intl.DateTimeFormat("es-ES",{timeZone:z.tz,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date()); const d=new Intl.DateTimeFormat("es-ES",{timeZone:z.tz,weekday:"long",year:"numeric",month:"long",day:"numeric"}).format(new Date()); const div=document.createElement("div"); div.className="card"; div.innerHTML=`<div class="label">${z.label}</div><div class="tz">${z.tz}</div><div class="time">${t}</div><div class="date">${d}</div>`; container.appendChild(div); }); }
updateClocks();
setInterval(updateClocks,1000);

// ----------------- MotoGP -----------------
const races = [
  {round:1, name:"GP de Tailandia", circuit:"Buriram", country:"Tailandia", tz:"Asia/Bangkok", date:"2026-03-01"},
  {round:2, name:"GP de Brasil", circuit: "Estrella Galicia 0,0 Grand Prix of Brazil", country: "Brasil", tz: "America/Sao_Paulo", date: "2026-03-20"},
  {round:3, name:"GP de EE.UU.", circuit:"Circuitos de las Americas", country:"EEUU", tz:"America/Chicago", date:"2026-03-30"},
  {round:4, name:"GP de Qatar", circuit:"Losail", country:"Qatar", tz:"Asia/Qatar", date:"2026-04-12"},
  {round:5, name:"GP de España", circuit:"Jerez", country:"España", tz:"Europe/Madrid", date:"2026-04-26"},
  {round:6, name:"GP de Francia", circuit:"Le Mans", country:"Francia", tz:"Europe/Paris", date:"2026-05-10"},
  {round:7, name:"GP de Inglaterra", circuit:"Silverstone", country:"Reino Unido", tz:"Europe/London", date:"2026-05-24"},
  {round:8, name:"GP de España", circuit:"Aragon - Motorland", country:"España", tz:"Europe/Madrid", date:"2026-06-07"},
  {round:9, name:"GP de Italia", circuit:"Mugello", country:"Italia", tz:"Europe/Rome", date:"2026-06-21"},
  {round:10, name:"GP de Holanda", circuit:"Assen", country:"Países Bajos", tz:"Europe/Amsterdam", date:"2026-06-28"},
  {round:11, name:"GP de Alemania", circuit:"Sachsenring", country:"Alemania", tz:"Europe/Berlin", date:"2026-07-12"},
  {round:12, name:"GP de República Checa", circuit:"Brno", country:"República Checa", tz:"Europe/Prague", date:"2026-07-19"},
  {round:13, name:"GP de Austria", circuit:"Österreichring", country:"Austria", tz:"Europe/Vienna", date:"2026-08-16"},
  {round:14, name:"GP de Hungría", circuit:"Balaton Park", country:"Hungría", tz:"Europe/Budapest", date:"2026-08-23"},
  {round:15, name:"GP de España", circuit:"Catalunya - Montmeló", country:"España", tz:"Europe/Madrid", date:"2026-09-06"},
  {round:16, name:"GP de San Marino", circuit:"Misano", country:"Italia", tz:"Europe/Rome", date:"2026-09-13"},
  {round:17, name:"GP de Japón", circuit:"Motegi", country:"Japón", tz:"Asia/Tokyo", date:"2026-09-27"},
  {round:18, name:"GP de Indonesia", circuit:"Pertamina Mandalika Circuit", country:"Indonesia", tz:"Asia/Jakarta", date:"2026-10-04"},
  {round:19, name:"GP de Australia", circuit:"Philip Island", country:"Australia", tz:"Australia/Melbourne", date:"2026-10-18"},
  {round:20, name:"GP de Malasia", circuit:"Sepang", country:"Malasia", tz:"Asia/Kuala_Lumpur", date:"2026-10-25"},
  {round:21, name:"GP de Portugal", circuit:"Portimao", country:"Portugal", tz:"Europe/Lisbon", date:"2026-11-08"},
  {round:22, name:"GP de España", circuit:"Valencia - Cheste", country:"España", tz:"Europe/Madrid", date:"2026-11-15"}
];

document.getElementById("toggleRaces").onclick = () => {
  const controls = document.getElementById("raceControls");
  controls.style.display = controls.style.display === "none" ? "block" : "none";
  renderRaces();
};

function renderRaces() {
  const container = document.getElementById("raceList");
  container.innerHTML = "";
  races.forEach(r => {
    // Hora actual en la zona horaria de la carrera
    const now = new Date();
    const timeOptions = { timeZone: r.tz, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false };
    const dateOptions = { timeZone: r.tz, year:"numeric", month:"2-digit", day:"2-digit" };
    const localTime = new Intl.DateTimeFormat("es-ES", timeOptions).format(now);
    const raceDate = new Intl.DateTimeFormat("es-ES", dateOptions).format(new Date(r.date));

    const div = document.createElement("div");
    div.className = "race-row";
    div.innerHTML = `<div class="race-info">
      <strong>${r.round}. ${r.name}</strong><br>
      ${r.circuit} — ${r.country}<br>
      Fecha: ${raceDate}<br>
      Hora local: ${localTime}
    </div>`;
    container.appendChild(div);
  });
}

// Actualiza cada segundo
setInterval(() => {
  if(document.getElementById("raceControls").style.display === "block") renderRaces();
}, 1000);
// ----------------- NOTAS -----------------
document.getElementById("toggleNotes").onclick=()=>{ const notes=document.getElementById("notesSection"); notes.style.display=notes.style.display==="none"?"block":"none"; };
document.getElementById("copyNotes").onclick=()=>{ const t=document.getElementById("notesText").value; if(t) navigator.clipboard.writeText(t).then(()=>alert("✅ Notas copiadas")).catch(()=>alert("❌ No se pudo copiar")); else alert("No hay notas para copiar"); };

// ----------------- TEMPORIZADOR OCULTO -----------------
document.getElementById("toggleTimer").onclick=()=>{ const t=document.getElementById("timerSection"); t.style.display=t.style.display==="none"?"block":"none"; };

// ----------------- ALGORITMOS -----------------
const algorithmData = {
  "F2L": [""], 
  "OLL": [""], 
  "OLL - OH": ["R U2 R2 U' R2 U' R2 U2 R"],
  "PLL": [""],
  "PLL - OH": ["R2 U R U R' U' R' U' R' U R'"],
  "PLL-SKIP": ["R U R' U'"],
  "AntiSexy": ["R U R' U' R' F R2 U' R' U' R U R' F'"],
  "Edge Control": ["U R U' R' U' F R U R' U' R' F R"],
  "MAGIC WONDENFUL": ["R U R' U R U2 R'"],
  "Sledge Hammer": ["R' F R F'"],
  "VLS": ["R' U' R U' R' U2 R"],
  "WV": ["R U R' U R U2 R'"],
  "ZBLL - AS": ["U R' U' R U R' U R U R' U' R U R' U R"],
  "ZBLL - S": ["R U R' U' R' F R2 U R' U R U R' F'"],
  "ZBLL - L": ["R2 U R U R' U' R' U' R' U R'"],
  "ZBLL - U": ["R U2 R2 U' R2 U' R2 U2 R"],
  "ZBLL - T": ["R U R' U' R' F R F'"],
  "ZBLL - Pi": ["R' U' R U' R' U2 R"],
  "ZBLL - H": ["R2 U2 R U R U' R U R U2 R"]
};

document.getElementById("toggleAlgorithms").onclick = ()=>{ const sec = document.getElementById("algorithmsSection"); sec.style.display = sec.style.display==="none"?"block":"none"; };

document.getElementById("algorithmCategory").onchange = (e) => {
    const cat = e.target.value;
    const display = document.getElementById("algorithmDisplay");

    if (cat === "F2L") {
        display.innerHTML = `
        <table border="1">
